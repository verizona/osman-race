<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Osman Race</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(10, 18, 34, 0.92);
      --text: #ffffff;
      --muted: #d1d5db;
      --btn: #2563eb;
      --btn2: rgba(17, 24, 39, 0.9);
      --nitro: #ff6a00;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
      height: 100%;
      width: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gameWrap {
      position: relative;
      width: min(100vw, 420px);
      height: 100vh;
      max-height: 100vh;
      background: #0b1220;
      overflow: hidden;
    }

    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(#87ceeb, #d7f0ff 35%, #6b7280 35%, #6b7280 100%);
    }

    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: white;
      font-weight: bold;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,.6);
      font-size: 18px;
    }

    .hud-left, .hud-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .top-buttons {
      position: absolute;
      top: 70px;
      right: 10px;
      z-index: 16;
      display: flex;
      gap: 8px;
    }

    .mini-btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      background: var(--btn2);
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
    }

    .mini-btn.active-sound {
      background: #14532d;
    }

    .mini-btn.muted-sound {
      background: #7f1d1d;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.35);
      z-index: 20;
      padding: 18px;
    }

    .panel {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      color: var(--text);
      border-radius: 24px;
      padding: 24px 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
    }

    .panel h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    .panel p {
      margin: 10px 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 16px;
    }

    .btn {
      margin-top: 16px;
      border: 0;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      background: var(--btn);
      color: white;
    }

    .controls {
      position: absolute;
      bottom: 16px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      z-index: 15;
      padding: 0 12px;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .ctrl {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 0;
      font-size: 32px;
      font-weight: bold;
      color: white;
      background: rgba(17, 24, 39, 0.9);
      box-shadow: 0 6px 20px rgba(0,0,0,.25);
      user-select: none;
      -webkit-user-select: none;
    }

    .nitro-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 0;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: radial-gradient(circle at 35% 30%, #ffb366, var(--nitro) 55%, #b91c1c 100%);
      box-shadow: 0 6px 20px rgba(0,0,0,.3);
      user-select: none;
      -webkit-user-select: none;
    }

    .nitro-btn:disabled {
      filter: grayscale(0.7);
      opacity: 0.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <div class="hud">
      <div class="hud-left">
        <div id="score">Score: 0</div>
        <div id="speed">Speed: 1</div>
      </div>
      <div class="hud-right">
        <div id="nitroStatus">Nitro: Ready</div>
        <div id="soundStatus">Sound: On</div>
      </div>
    </div>

    <div class="top-buttons">
      <button class="mini-btn active-sound" id="soundBtn">🔊 Sound</button>
    </div>

    <canvas id="game"></canvas>

    <div class="controls">
      <button class="ctrl" id="leftBtn">◀</button>
      <button class="nitro-btn" id="nitroBtn">NITRO</button>
      <button class="ctrl" id="rightBtn">▶</button>
    </div>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <h1>OSMAN RACE</h1>
        <p>Desktop: use left/right arrow keys</p>
        <p>Phone: use swipe or the buttons below</p>
        <p>Tap NITRO for a speed burst. Avoid traffic and survive.</p>
        <button class="btn" id="startBtn">Start Game</button>
      </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
      <div class="panel">
        <h1>Game Over</h1>
        <p id="finalScore">Score: 0</p>
        <button class="btn" id="restartBtn">Play Again</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const wrap = document.getElementById("gameWrap");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const nitroStatusEl = document.getElementById("nitroStatus");
    const soundStatusEl = document.getElementById("soundStatus");
    const soundBtn = document.getElementById("soundBtn");

    const startOverlay = document.getElementById("startOverlay");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const finalScoreEl = document.getElementById("finalScore");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const nitroBtn = document.getElementById("nitroBtn");

    const BASE_W = 420;
    const BASE_H = 740;

    function resizeCanvas() {
      const rect = wrap.getBoundingClientRect();
      canvas.width = Math.max(320, Math.floor(rect.width));
      canvas.height = Math.max(560, Math.floor(rect.height));
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function W() { return canvas.width; }
    function H() { return canvas.height; }

    function roadX() { return W() * 0.17; }
    function roadW() { return W() * 0.66; }
    function laneCount() { return 3; }
    function laneW() { return roadW() / laneCount(); }

    let gameRunning = false;
    let gameOverPending = false;
    let score = 0;
    let baseSpeed = 5;
    let roadOffset = 0;
    let spawnTimer = 0;
    let lastTime = 0;
    let enemies = [];
    let particles = [];
    let explosion = null;
    let flashAlpha = 0;

    let soundEnabled = true;

    let nitroActive = false;
    let nitroTimeLeft = 0;
    let nitroCooldown = 0;
    const NITRO_DURATION = 1.8;
    const NITRO_COOLDOWN = 6.0;
    const NITRO_BOOST = 5.5;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let engineMasterGain = null;
    let engineOsc1 = null;
    let engineOsc2 = null;
    let engineFilter = null;
    let engineLfo = null;
    let engineLfoGain = null;
    let engineStarted = false;

    function unlockAudio() {
      if (!soundEnabled) return;
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      if (!engineStarted) {
        startEngineAudio();
      }
    }

    function startEngineAudio() {
      engineMasterGain = audioCtx.createGain();
      engineMasterGain.gain.value = 0.0001;

      engineFilter = audioCtx.createBiquadFilter();
      engineFilter.type = "lowpass";
      engineFilter.frequency.value = 900;

      engineOsc1 = audioCtx.createOscillator();
      engineOsc1.type = "sawtooth";
      engineOsc1.frequency.value = 70;

      engineOsc2 = audioCtx.createOscillator();
      engineOsc2.type = "triangle";
      engineOsc2.frequency.value = 35;

      engineLfo = audioCtx.createOscillator();
      engineLfo.type = "sine";
      engineLfo.frequency.value = 11;

      engineLfoGain = audioCtx.createGain();
      engineLfoGain.gain.value = 6;

      engineLfo.connect(engineLfoGain);
      engineLfoGain.connect(engineOsc1.frequency);

      engineOsc1.connect(engineFilter);
      engineOsc2.connect(engineFilter);
      engineFilter.connect(engineMasterGain);
      engineMasterGain.connect(audioCtx.destination);

      engineOsc1.start();
      engineOsc2.start();
      engineLfo.start();

      engineStarted = true;
    }

    function setEngineSound(running, speedValue) {
      if (!engineStarted || !soundEnabled) return;

      const now = audioCtx.currentTime;

      if (!running) {
        engineMasterGain.gain.cancelScheduledValues(now);
        engineMasterGain.gain.setTargetAtTime(0.0001, now, 0.12);
        return;
      }

      const pitch = 65 + (speedValue - 5) * 11;
      const pitch2 = 32 + (speedValue - 5) * 5.5;
      const gain = Math.min(0.11, 0.045 + (speedValue - 5) * 0.006);
      const filterFreq = Math.min(1800, 850 + (speedValue - 5) * 130);

      engineOsc1.frequency.setTargetAtTime(pitch, now, 0.08);
      engineOsc2.frequency.setTargetAtTime(pitch2, now, 0.08);
      engineFilter.frequency.setTargetAtTime(filterFreq, now, 0.08);
      engineMasterGain.gain.setTargetAtTime(gain, now, 0.12);
    }

    function stopEngineSound() {
      if (!engineStarted) return;
      const now = audioCtx.currentTime;
      engineMasterGain.gain.setTargetAtTime(0.0001, now, 0.08);
    }

    function playBoomSound() {
      if (!soundEnabled) return;
      unlockAudio();

      const now = audioCtx.currentTime;

      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();

      osc1.type = "sawtooth";
      osc1.frequency.setValueAtTime(140, now);
      osc1.frequency.exponentialRampToValueAtTime(40, now + 0.35);

      gain1.gain.setValueAtTime(0.0001, now);
      gain1.gain.exponentialRampToValueAtTime(0.7, now + 0.01);
      gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);

      osc1.connect(gain1).connect(audioCtx.destination);
      osc1.start(now);
      osc1.stop(now + 0.42);

      const bufferSize = audioCtx.sampleRate * 0.45;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const decay = 1 - i / bufferSize;
        data[i] = (Math.random() * 2 - 1) * decay * 0.7;
      }

      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;

      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = "lowpass";
      noiseFilter.frequency.setValueAtTime(900, now);

      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.8, now + 0.01);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.45);

      noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
      noise.start(now);
      noise.stop(now + 0.46);
    }

    function playNitroSound() {
      if (!soundEnabled) return;
      unlockAudio();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "square";
      osc.frequency.setValueAtTime(180, now);
      osc.frequency.exponentialRampToValueAtTime(620, now + 0.22);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1200, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.18, now + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.28);

      osc.connect(filter).connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.3);
    }

    function vibrateCrash() {
      if ("vibrate" in navigator) {
        navigator.vibrate([120, 60, 180]);
      }
    }

    function scaleX(v) {
      return v * (W() / BASE_W);
    }

    function scaleY(v) {
      return v * (H() / BASE_H);
    }

    function laneCenter(lane) {
      return roadX() + lane * laneW() + laneW() / 2;
    }

    const player = {
      lane: 1,
      x: laneCenter(1),
      targetX: laneCenter(1),
      y: () => H() - scaleY(120),
      w: () => scaleX(56),
      h: () => scaleY(96)
    };

    function updateSoundUI() {
      soundStatusEl.textContent = soundEnabled ? "Sound: On" : "Sound: Off";
      soundBtn.textContent = soundEnabled ? "🔊 Sound" : "🔇 Muted";
      soundBtn.classList.toggle("active-sound", soundEnabled);
      soundBtn.classList.toggle("muted-sound", !soundEnabled);
    }

    function updateNitroUI() {
      if (nitroActive) {
        nitroStatusEl.textContent = `Nitro: ${nitroTimeLeft.toFixed(1)}s`;
        nitroBtn.disabled = true;
      } else if (nitroCooldown > 0) {
        nitroStatusEl.textContent = `Nitro CD: ${nitroCooldown.toFixed(1)}s`;
        nitroBtn.disabled = true;
      } else {
        nitroStatusEl.textContent = "Nitro: Ready";
        nitroBtn.disabled = false;
      }
    }

    function resetGame() {
      gameRunning = true;
      gameOverPending = false;
      score = 0;
      baseSpeed = 5;
      roadOffset = 0;
      spawnTimer = 0;
      enemies = [];
      particles = [];
      explosion = null;
      flashAlpha = 0;
      nitroActive = false;
      nitroTimeLeft = 0;
      nitroCooldown = 0;

      player.lane = 1;
      player.x = laneCenter(1);
      player.targetX = laneCenter(1);

      scoreEl.textContent = "Score: 0";
      speedEl.textContent = "Speed: 1";
      updateNitroUI();
      updateSoundUI();

      gameOverOverlay.classList.add("hidden");

      if (soundEnabled) {
        unlockAudio();
        setEngineSound(true, baseSpeed);
      }
    }

    function moveLeft() {
      if (!gameRunning) return;
      if (player.lane > 0) {
        player.lane -= 1;
        player.targetX = laneCenter(player.lane);
      }
    }

    function moveRight() {
      if (!gameRunning) return;
      if (player.lane < laneCount() - 1) {
        player.lane += 1;
        player.targetX = laneCenter(player.lane);
      }
    }

    function activateNitro() {
      if (!gameRunning) return;
      if (nitroActive || nitroCooldown > 0) return;

      nitroActive = true;
      nitroTimeLeft = NITRO_DURATION;
      nitroCooldown = NITRO_COOLDOWN;
      playNitroSound();

      if ("vibrate" in navigator) {
        navigator.vibrate(40);
      }

      updateNitroUI();
    }

    function drawRoad(currentSpeed) {
      ctx.clearRect(0, 0, W(), H());

      ctx.fillStyle = nitroActive ? "#22c55e" : "#4ade80";
      ctx.fillRect(0, 0, roadX(), H());
      ctx.fillRect(roadX() + roadW(), 0, W() - (roadX() + roadW()), H());

      ctx.fillStyle = nitroActive ? "#23242b" : "#31323a";
      ctx.fillRect(roadX(), 0, roadW(), H());

      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = scaleX(4);
      ctx.beginPath();
      ctx.moveTo(roadX(), 0);
      ctx.lineTo(roadX(), H());
      ctx.moveTo(roadX() + roadW(), 0);
      ctx.lineTo(roadX() + roadW(), H());
      ctx.stroke();

      ctx.fillStyle = nitroActive ? "#fff07a" : "#b59f2e";
      for (let lane = 1; lane < laneCount(); lane++) {
        const x = roadX() + lane * laneW() - scaleX(3);
        for (let y = -roadOffset; y < H(); y += scaleY(70)) {
          ctx.fillRect(x, y, scaleX(6), scaleY(42));
        }
      }

      if (nitroActive) {
        ctx.fillStyle = "rgba(255,255,255,0.07)";
        for (let i = 0; i < 8; i++) {
          const streakX = roadX() + Math.random() * roadW();
          const streakY = Math.random() * H();
          ctx.fillRect(streakX, streakY, scaleX(2), scaleY(22 + Math.random() * 30));
        }
      }
    }

    function circle(x, y, r) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(ctx, x, y, w, h, r, fill) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) ctx.fill();
    }

    function drawCar(x, y, color, label = "", isPlayer = false) {
      const w = scaleX(56);
      const h = scaleY(96);
      const left = x - w / 2;
      const top = y - h / 2;

      ctx.fillStyle = "rgba(0,0,0,0.18)";
      roundRect(ctx, left + scaleX(5), top + scaleY(6), w, h, scaleX(12), true);

      ctx.fillStyle = color;
      roundRect(ctx, left, top, w, h, scaleX(12), true);

      ctx.fillStyle = "#9ab6d6";
      roundRect(ctx, left + scaleX(10), top + scaleY(12), w - scaleX(20), scaleY(22), scaleX(8), true);
      roundRect(ctx, left + scaleX(10), top + scaleY(60), w - scaleX(20), scaleY(16), scaleX(8), true);

      ctx.fillStyle = "#111827";
      ctx.fillRect(left - scaleX(3), top + scaleY(14), scaleX(8), scaleY(20));
      ctx.fillRect(left - scaleX(3), top + h - scaleY(34), scaleX(8), scaleY(20));
      ctx.fillRect(left + w - scaleX(5), top + scaleY(14), scaleX(8), scaleY(20));
      ctx.fillRect(left + w - scaleX(5), top + h - scaleY(34), scaleX(8), scaleY(20));

      ctx.fillStyle = "#b59f2e";
      circle(left + scaleX(12), top + scaleY(10), scaleX(5));
      circle(left + w - scaleX(12), top + scaleY(10), scaleX(5));

      ctx.fillStyle = isPlayer ? "#ffffff" : "#ef4444";
      circle(left + scaleX(12), top + h - scaleY(10), scaleX(5));
      circle(left + w - scaleX(12), top + h - scaleY(10), scaleX(5));

      if (isPlayer && nitroActive) {
        const flameY = top + h + scaleY(6);
        ctx.fillStyle = "#ffcc33";
        circle(x - scaleX(10), flameY, scaleX(5));
        circle(x + scaleX(10), flameY, scaleX(5));

        ctx.fillStyle = "#ff5a00";
        circle(x - scaleX(10), flameY + scaleY(6), scaleX(8));
        circle(x + scaleX(10), flameY + scaleY(6), scaleX(8));
      }

      if (label) {
        ctx.fillStyle = "#ffffff";
        ctx.font = `bold ${Math.max(12, Math.floor(scaleX(18)))}px Arial`;
        ctx.textAlign = "center";
        ctx.fillText(label, x, y + scaleY(6));
      }
    }

    function spawnEnemy(currentSpeed) {
      const lane = Math.floor(Math.random() * laneCount());
      enemies.push({
        lane,
        x: laneCenter(lane),
        y: -scaleY(110),
        w: scaleX(56),
        h: scaleY(96),
        speed: currentSpeed + 1.5 + Math.random() * 1.8,
        color: ["#ef4444", "#f97316", "#8b5cf6", "#06b6d4"][Math.floor(Math.random() * 4)]
      });
    }

    function rectsCollide(a, b) {
      return !(
        a.x + a.w / 2 < b.x - b.w / 2 ||
        a.x - a.w / 2 > b.x + b.w / 2 ||
        a.y + a.h / 2 < b.y - b.h / 2 ||
        a.y - a.h / 2 > b.y + b.h / 2
      );
    }

    function createExplosion(x, y) {
      explosion = {
        x,
        y,
        radius: scaleX(12),
        maxRadius: scaleX(85),
        life: 0.55,
        age: 0
      };

      particles = [];

      for (let i = 0; i < 38; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = scaleX(2 + Math.random() * 7);
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - Math.random() * scaleY(1.2),
          life: 0.9 + Math.random() * 0.5,
          age: 0,
          size: scaleX(3 + Math.random() * 6),
          color: ["#ffcc33", "#ff7a00", "#ff3b30", "#ffd966", "#ffffff"][Math.floor(Math.random() * 5)]
        });
      }

      flashAlpha = 0.85;
      playBoomSound();
      vibrateCrash();
    }

    function endGame(crashX, crashY) {
      if (gameOverPending) return;
      gameRunning = false;
      nitroActive = false;
      nitroTimeLeft = 0;
      updateNitroUI();
      stopEngineSound();
      gameOverPending = true;
      createExplosion(crashX, crashY);
    }

    function finishGameOver() {
      finalScoreEl.textContent = `Score: ${score}`;
      gameOverOverlay.classList.remove("hidden");
      gameOverPending = false;
    }

    function updateExplosion(dtSeconds) {
      if (explosion) {
        explosion.age += dtSeconds;
        const t = Math.min(1, explosion.age / explosion.life);
        explosion.radius = explosion.maxRadius * t;

        if (explosion.age >= explosion.life) {
          explosion = null;
          if (particles.length === 0 && gameOverPending) {
            finishGameOver();
          }
        }
      }

      if (particles.length > 0) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.age += dtSeconds;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += scaleY(0.08);
          p.vx *= 0.992;

          if (p.age >= p.life) {
            particles.splice(i, 1);
          }
        }
      }

      if (!explosion && particles.length === 0 && gameOverPending) {
        finishGameOver();
      }

      if (flashAlpha > 0) {
        flashAlpha -= dtSeconds * 2.2;
        if (flashAlpha < 0) flashAlpha = 0;
      }
    }

    function drawExplosion() {
      if (explosion) {
        const progress = explosion.age / explosion.life;
        const alpha = Math.max(0, 1 - progress);

        const grad = ctx.createRadialGradient(
          explosion.x, explosion.y, scaleX(4),
          explosion.x, explosion.y, explosion.radius
        );
        grad.addColorStop(0, `rgba(255,255,255,${0.95 * alpha})`);
        grad.addColorStop(0.25, `rgba(255,220,120,${0.95 * alpha})`);
        grad.addColorStop(0.55, `rgba(255,120,0,${0.8 * alpha})`);
        grad.addColorStop(1, `rgba(255,0,0,0)`);

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const p of particles) {
        const alpha = Math.max(0, 1 - p.age / p.life);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255,255,255,${flashAlpha * 0.45})`;
        ctx.fillRect(0, 0, W(), H());
      }
    }

    function update(dt) {
      const dtSeconds = dt / 1000;

      if (gameRunning) {
        if (nitroActive) {
          nitroTimeLeft -= dtSeconds;
          if (nitroTimeLeft <= 0) {
            nitroActive = false;
            nitroTimeLeft = 0;
          }
        }

        if (nitroCooldown > 0) {
          nitroCooldown -= dtSeconds;
          if (nitroCooldown < 0) nitroCooldown = 0;
        }

        const currentSpeed = baseSpeed + (nitroActive ? NITRO_BOOST : 0);

        roadOffset = (roadOffset + currentSpeed) % scaleY(70);
        spawnTimer += dt;

        const moveEase = nitroActive ? 0.28 : 0.22;
        player.x += (player.targetX - player.x) * moveEase;
        if (Math.abs(player.targetX - player.x) < 0.5) {
          player.x = player.targetX;
        }

        const spawnThreshold = nitroActive
          ? Math.max(260, 750 - score * 7)
          : Math.max(420, 950 - score * 7);

        if (spawnTimer > spawnThreshold) {
          spawnTimer = 0;
          if (enemies.length < 8) spawnEnemy(currentSpeed);
        }

        const playerBox = {
          x: player.x,
          y: player.y(),
          w: player.w(),
          h: player.h()
        };

        for (let i = enemies.length - 1; i >= 0; i--) {
          enemies[i].y += enemies[i].speed + (nitroActive ? 1.2 : 0);

          if (rectsCollide(playerBox, enemies[i])) {
            endGame(player.x, player.y());
            return;
          }

          if (enemies[i].y - enemies[i].h / 2 > H()) {
            enemies.splice(i, 1);
            score += nitroActive ? 2 : 1;
            if (score % 5 === 0) baseSpeed += 0.35;
          }
        }

        if (soundEnabled) {
          unlockAudio();
          setEngineSound(true, currentSpeed);
        }

        scoreEl.textContent = `Score: ${score}`;
        speedEl.textContent = `Speed: ${Math.max(1, Math.round(currentSpeed - 4))}`;
        updateNitroUI();
      }

      if (explosion || particles.length > 0 || flashAlpha > 0) {
        updateExplosion(dtSeconds);
      }
    }

    function draw() {
      const currentSpeed = baseSpeed + (nitroActive ? NITRO_BOOST : 0);
      drawRoad(currentSpeed);

      enemies.forEach(e => drawCar(e.x, e.y, e.color));

      if (!explosion) {
        drawCar(player.x, player.y(), nitroActive ? "#1d4ed8" : "#2563eb", "OSMAN", true);
      }

      drawExplosion();
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = ts - lastTime;
      lastTime = ts;

      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        unlockAudio();
        moveLeft();
      }
      if (e.key === "ArrowRight") {
        unlockAudio();
        moveRight();
      }
      if (e.key === " " || e.key.toLowerCase() === "n") {
        e.preventDefault();
        unlockAudio();
        activateNitro();
      }
      if (e.key.toLowerCase() === "m") {
        soundEnabled = !soundEnabled;
        if (!soundEnabled) stopEngineSound();
        updateSoundUI();
      }
    });

    leftBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      unlockAudio();
      moveLeft();
    }, { passive: false });

    rightBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      unlockAudio();
      moveRight();
    }, { passive: false });

    nitroBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      unlockAudio();
      activateNitro();
    }, { passive: false });

    leftBtn.addEventListener("click", () => {
      unlockAudio();
      moveLeft();
    });

    rightBtn.addEventListener("click", () => {
      unlockAudio();
      moveRight();
    });

    nitroBtn.addEventListener("click", () => {
      unlockAudio();
      activateNitro();
    });

    soundBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled) {
        stopEngineSound();
      } else if (gameRunning) {
        unlockAudio();
        setEngineSound(true, baseSpeed + (nitroActive ? NITRO_BOOST : 0));
      }
      updateSoundUI();
    });

    startBtn.addEventListener("click", () => {
      if (soundEnabled) unlockAudio();
      startOverlay.classList.add("hidden");
      resetGame();
    });

    restartBtn.addEventListener("click", () => {
      if (soundEnabled) unlockAudio();
      resetGame();
    });

    // Better swipe
    let swipeStartX = 0;
    let swipeStartY = 0;
    let swipeActive = false;
    let swipeTriggered = false;

    const SWIPE_THRESHOLD = 24;
    const VERTICAL_LIMIT = 45;

    canvas.addEventListener("touchstart", (e) => {
      if (!gameRunning) return;
      const t = e.touches[0];
      swipeStartX = t.clientX;
      swipeStartY = t.clientY;
      swipeActive = true;
      swipeTriggered = false;
    }, { passive: true });

    canvas.addEventListener("touchmove", (e) => {
      if (!swipeActive || swipeTriggered || !gameRunning) return;

      const t = e.touches[0];
      const dx = t.clientX - swipeStartX;
      const dy = t.clientY - swipeStartY;

      if (Math.abs(dy) > VERTICAL_LIMIT && Math.abs(dy) > Math.abs(dx)) {
        return;
      }

      if (dx <= -SWIPE_THRESHOLD) {
        unlockAudio();
        moveLeft();
        swipeTriggered = true;
      } else if (dx >= SWIPE_THRESHOLD) {
        unlockAudio();
        moveRight();
        swipeTriggered = true;
      }
    }, { passive: true });

    canvas.addEventListener("touchend", () => {
      swipeActive = false;
      swipeTriggered = false;
    }, { passive: true });

    canvas.addEventListener("touchcancel", () => {
      swipeActive = false;
      swipeTriggered = false;
    }, { passive: true });

    updateSoundUI();
    updateNitroUI();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
